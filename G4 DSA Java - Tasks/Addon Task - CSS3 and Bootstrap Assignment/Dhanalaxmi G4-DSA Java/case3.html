<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Use Case 3: Login Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="case3.css">
</head>
<body class="bg-light">

  <div class="container py-5 mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-4 p-sm-5">
            <h3 class="fw-bold text-center mb-4 text-dark">Account Login</h3>
            
            <form>
              <div class="mb-3">
                <label for="loginEmail" class="form-label fw-semibold text-muted small">Email address</label>
                <input type="email" class="form-control form-control-custom py-2"
                 id="loginEmail" placeholder="name@example.com" required>
              </div>
              
              <div class="mb-3">
                <label for="loginPassword" class="form-label fw-semibold text-muted small">Password</label>
                <input type="password" class="form-control form-control-custom py-2" id="loginPassword" placeholder="••••••••" required>
              </div>
              
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="rememberMe">
                  <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="text-decoration-none forgot-password-link">Forgot password?</a>
              </div>
              
              <div class="d-grid">
                <button type="submit" class="btn btn-primary py-2 fw-semibold rounded-3 shadow-sm btn-login-submit">Sign In</button>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
