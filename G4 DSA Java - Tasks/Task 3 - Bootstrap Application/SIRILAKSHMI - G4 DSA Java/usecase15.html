<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .gallery-item {
            overflow: hidden;
            border-radius: 10px;
        }

        .gallery-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.1);
        }

        .caption {
            text-align: center;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-5">Image Gallery</h2>

    <div class="row g-4">

        <!-- Image 1 -->
        <div class="col-md-6 col-lg-4">
            <div class="gallery-item">
                <img src="https://picsum.photos/id/1015/600/400"
                     class="gallery-img"
                     alt="Nature">
            </div>
            <p class="caption">Beautiful Mountains</p>
        </div>

        <!-- Image 2 -->
        <div class="col-md-6 col-lg-4">
            <div class="gallery-item">
                <img src="https://picsum.photos/id/1025/600/400"
                     class="gallery-img"
                     alt="Animal">
            </div>
            <p class="caption">Cute Dog</p>
        </div>

        <!-- Image 3 -->
        <div class="col-md-6 col-lg-4">
            <div class="gallery-item">
                <img src="https://picsum.photos/id/1035/600/400"
                     class="gallery-img"
                     alt="Beach">
            </div>
            <p class="caption">Sunny Beach</p>
        </div>

        <!-- Image 4 -->
        <div class="col-md-6 col-lg-4">
            <div class="gallery-item">
                <img src="https://picsum.photos/id/1040/600/400"
                     class="gallery-img"
                     alt="Forest">
            </div>
            <p class="caption">Green Forest</p>
        </div>

        <!-- Image 5 -->
        <div class="col-md-6 col-lg-4">
            <div class="gallery-item">
                <img src="https://picsum.photos/id/1050/600/400"
                     class="gallery-img"
                     alt="City">
            </div>
            <p class="caption">City Lights</p>
        </div>

        <!-- Image 6 -->
        <div class="col-md-6 col-lg-4">
            <div class="gallery-item">
                <img src="https://picsum.photos/id/1060/600/400"
                     class="gallery-img"
                     alt="Lake">
            </div>
            <p class="caption">Peaceful Lake</p>
        </div>

    </div>
</div>

</body>
</html>
