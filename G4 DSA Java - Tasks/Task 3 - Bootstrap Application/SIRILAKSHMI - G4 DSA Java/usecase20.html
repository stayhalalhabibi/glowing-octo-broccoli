<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
        }

        .sidebar {
            background-color: #212529;
            min-height: 100vh;
            color: white;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background-color: #343a40;
        }

        .dashboard-card {
            transition: transform 0.3s ease;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar p-3">

            <h3 class="text-center mb-4">Admin Panel</h3>

            <a href="#">🏠 Dashboard</a>
            <a href="#">👥 Users</a>
            <a href="#">📦 Orders</a>
            <a href="#">📊 Reports</a>
            <a href="#">⚙ Settings</a>

            <div class="mt-4">
                <button class="btn btn-danger w-100">
                    Logout
                </button>
            </div>

        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10">

            <!-- Header -->
            <div class="bg-light p-3 border-bottom d-flex justify-content-between align-items-center">
                <h2>Dashboard</h2>
                <span>Welcome, Admin</span>
            </div>

            <!-- Content Area -->
            <div class="container mt-4">

                <div class="row g-4">

                    <!-- Card 1 -->
                    <div class="col-md-6 col-lg-3">
                        <div class="card dashboard-card shadow text-center">
                            <div class="card-body">
                                <h5>Total Users</h5>
                                <h3>1,250</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Card 2 -->
                    <div class="col-md-6 col-lg-3">
                        <div class="card dashboard-card shadow text-center">
                            <div class="card-body">
                                <h5>Total Orders</h5>
                                <h3>860</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Card 3 -->
                    <div class="col-md-6 col-lg-3">
                        <div class="card dashboard-card shadow text-center">
                            <div class="card-body">
                                <h5>Revenue</h5>
                                <h3>₹75,000</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Card 4 -->
                    <div class="col-md-6 col-lg-3">
                        <div class="card dashboard-card shadow text-center">
                            <div class="card-body">
                                <h5>Pending Tasks</h5>
                                <h3>24</h3>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Main Content Section -->
                <div class="card mt-4 shadow">
                    <div class="card-body">
                        <h4>Main Content Area</h4>
                        <p>
                            This section can display reports,
                            charts, tables, user information,
                            or any dashboard content.
                        </p>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
