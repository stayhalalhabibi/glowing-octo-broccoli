<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Employee Table</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Employee Management</h2>

    <!-- Responsive Table Wrapper -->
    <div class="table-responsive">

        <table class="table table-bordered table-hover align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>EMP001</td>
                    <td>bhanu</td>
                    <td>IT</td>
                    <td>bhanu@example.com</td>
                    <td>
                        <span class="badge bg-success">Active</span>
                    </td>
                    <td>
                        <button class="btn btn-primary btn-sm">
                            Edit
                        </button>
                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>EMP002</td>
                    <td>srinu</td>
                    <td>HR</td>
                    <td>srinu@example.com</td>
                    <td>
                        <span class="badge bg-warning text-dark">
                            Pending
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-primary btn-sm">
                            Edit
                        </button>
                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>EMP003</td>
                    <td>siri</td>
                    <td>Finance</td>
                    <td>siri@example.com</td>
                    <td>
                        <span class="badge bg-danger">
                            Inactive
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-primary btn-sm">
                            Edit
                        </button>
                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>EMP004</td>
                    <td>abhi</td>
                    <td>Marketing</td>
                    <td>abhi@example.com</td>
                    <td>
                        <span class="badge bg-success">
                            Active
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-primary btn-sm">
                            Edit
                        </button>
                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </td>
                </tr>
            </tbody>

        </table>

    </div>
</div>

</body>
</html>
