<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Progress Bars</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .html-bar {
            background-color: #e34c26;
        }

        .css-bar {
            background-color: #264de4;
        }

        .bootstrap-bar {
            background-color: #7952b3;
        }

        .js-bar {
            background-color: #f7df1e;
            color: black;
        }

        .csharp-bar {
            background-color: #68217a;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Skill Progress Tracker</h2>

    <!-- HTML -->
    <label class="fw-bold">HTML - 90%</label>
    <div class="progress mb-3">
        <div class="progress-bar html-bar"
             role="progressbar"
             style="width: 90%;">
            90%
        </div>
    </div>

    <!-- CSS -->
    <label class="fw-bold">CSS - 85%</label>
    <div class="progress mb-3">
        <div class="progress-bar css-bar"
             role="progressbar"
             style="width: 85%;">
            85%
        </div>
    </div>

    <!-- Bootstrap -->
    <label class="fw-bold">Bootstrap - 80%</label>
    <div class="progress mb-3">
        <div class="progress-bar bootstrap-bar"
             role="progressbar"
             style="width: 80%;">
            80%
        </div>
    </div>

    <!-- JavaScript -->
    <label class="fw-bold">JavaScript - 75%</label>
    <div class="progress mb-3">
        <div class="progress-bar js-bar"
             role="progressbar"
             style="width: 75%;">
            75%
        </div>
    </div>

    <!-- C# -->
    <label class="fw-bold">C# - 70%</label>
    <div class="progress mb-3">
        <div class="progress-bar csharp-bar"
             role="progressbar"
             style="width: 70%;">
            70%
        </div>
    </div>

</div>

</body>
</html>
