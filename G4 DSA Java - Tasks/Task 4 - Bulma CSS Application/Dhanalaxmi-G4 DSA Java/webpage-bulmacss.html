<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback Form</title>

    <!-- Bulma CSS -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
</head>

<body class="has-background-light">

<section class="section">

<div class="container">

<div class="columns is-centered">

<div class="column is-8">

<div class="box">

<h1 class="title has-text-centered has-text-primary">
Customer Feedback Form
</h1>

<p class="subtitle has-text-centered">
We value your feedback! Please take a moment to share your experience.
</p>

<hr>

<form>

<!-- Name -->

<div class="field">
<label class="label">Full Name</label>

<div class="control">
<input class="input"
type="text"
placeholder="Enter your full name">
</div>
</div>

<!-- Email -->

<div class="field">
<label class="label">Email Address</label>

<div class="control">
<input class="input"
type="email"
placeholder="Enter your email">
</div>
</div>

<!-- Phone -->

<div class="field">
<label class="label">Phone Number</label>

<div class="control">
<input class="input"
type="tel"
placeholder="Enter your phone number">
</div>
</div>

<!-- Service -->

<div class="field">

<label class="label">Service Used</label>

<div class="control">

<div class="select is-fullwidth">

<select>

<option>Select Service</option>

<option>Visa Application</option>

<option>Passport Renewal</option>

<option>Tourist Visa</option>

<option>Business Visa</option>

<option>Student Visa</option>

</select>

</div>

</div>

</div>

<!-- Rating -->

<div class="field">

<label class="label">
Overall Rating
</label>

<div class="control">

<label class="radio">
<input type="radio" name="rating">
Excellent
</label>

<label class="radio">
<input type="radio" name="rating">
Good
</label>

<label class="radio">
<input type="radio" name="rating">
Average
</label>

<label class="radio">
<input type="radio" name="rating">
Poor
</label>

</div>

</div>

<!-- Satisfaction -->

<div class="field">

<label class="label">
What did you like?
</label>

<div class="control">

<label class="checkbox">
<input type="checkbox">
Quick Service
</label>

<br>

<label class="checkbox">
<input type="checkbox">
Friendly Staff
</label>

<br>

<label class="checkbox">
<input type="checkbox">
Easy Process
</label>

<br>

<label class="checkbox">
<input type="checkbox">
Affordable Fees
</label>

</div>

</div>

<!-- Feedback -->

<div class="field">

<label class="label">
Your Feedback
</label>

<div class="control">

<textarea class="textarea"
placeholder="Write your feedback here..."></textarea>

</div>

</div>

<!-- Recommend -->

<div class="field">

<label class="label">
Would you recommend us?
</label>

<div class="control">

<label class="radio">
<input type="radio" name="recommend">
Yes
</label>

<label class="radio">
<input type="radio" name="recommend">
No
</label>

</div>

</div>

<!-- Buttons -->

<div class="field is-grouped is-grouped-centered">

<div class="control">

<button class="button is-primary is-medium">
Submit Feedback
</button>

</div>

<div class="control">

<button type="reset"
class="button is-light is-medium">

Reset

</button>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</section>

</body>
</html>
