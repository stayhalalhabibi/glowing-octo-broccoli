<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEasy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold">🛍️ ShopEasy</a>
    <a class="btn btn-warning">🛒 Cart</a>
  </div>
</nav>

<!-- Hero -->
<div class="bg-warning text-center py-5">
  <h1 class="fw-bold">Welcome to ShopEasy!</h1>
  <p class="lead">Best products at best prices!</p>
  <a href="#" class="btn btn-dark btn-lg">Shop Now</a>
</div>

<!-- Products -->
<div class="container my-5">
  <h2 class="text-center mb-4">Featured Products</h2>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card shadow text-center p-3">
        <div class="fs-1">👗</div>
        <h5>Stylish Dress</h5>
        <p class="text-danger fw-bold">₹999</p>
        <button class="btn btn-dark">Add to Cart</button>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow text-center p-3">
        <div class="fs-1">📱</div>
        <h5>Smartphone</h5>
        <p class="text-danger fw-bold">₹15,999</p>
        <button class="btn btn-dark">Add to Cart</button>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow text-center p-3">
        <div class="fs-1">🎧</div>
        <h5>Headphones</h5>
        <p class="text-danger fw-bold">₹2,499</p>
        <button class="btn btn-dark">Add to Cart</button>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
  <p class="mb-0">© 2026 Lakshmi Prasanna. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
