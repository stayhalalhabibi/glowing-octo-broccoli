<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Navbar & Carousel</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">My Website</a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    
    <div id="carouselExample" class="carousel slide mt-3" data-bs-ride="carousel">

        
        <div class="carousel-indicators">
            <button type="button"
                    data-bs-target="#carouselExample"
                    data-bs-slide-to="0"
                    class="active"></button>

            <button type="button"
                    data-bs-target="#carouselExample"
                    data-bs-slide-to="1"></button>

            <button type="button"
                    data-bs-target="#carouselExample"
                    data-bs-slide-to="2"></button>
        </div>

        
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://picsum.photos/id/1015/1200/500"
                     class="d-block w-100"
                     alt="Image 1">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/id/1016/1200/500"
                     class="d-block w-100"
                     alt="Image 2">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/id/1018/1200/500"
                     class="d-block w-100"
                     alt="Image 3">
            </div>

        </div>

        <!-- Previous Button -->
        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExample"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>
        </button>

        <!-- Next Button -->
        <button class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExample"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
