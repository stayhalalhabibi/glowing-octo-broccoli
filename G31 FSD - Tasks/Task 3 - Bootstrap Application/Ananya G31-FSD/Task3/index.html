<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Task Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <main class="container py-5 app-shell">
      <div class="row g-4 align-items-stretch">
        <div class="col-12 col-lg-5">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-body p-4">
              <span class="badge rounded-pill brand-badge mb-3">Todo App</span>
              <h1 class="display-6 fw-semibold mb-3">Task Tracker</h1>
              <p class="text-secondary mb-4">
                Add a task, mark it complete, and keep the list clean with a very small Bootstrap app.
              </p>

              <form id="taskForm" class="vstack gap-3">
                <div>
                  <label for="taskInput" class="form-label">New task</label>
                  <input id="taskInput" class="form-control form-control-lg" type="text" placeholder="Write something to do" required />
                </div>
                <button class="btn btn-primary btn-lg" type="submit">Add Task</button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-7">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h4 mb-0">Your Tasks</h2>
                <span class="badge text-bg-secondary" id="taskCount">0 tasks</span>
              </div>

              <div class="alert alert-light border mb-4" role="status">
                Click a task to toggle its completed state. Use the button to remove it.
              </div>

              <ul id="taskList" class="list-group list-group-flush"></ul>
            </div>
          </div>
        </div>
      </div>
    </main>

    <template id="taskTemplate">
      <li class="list-group-item d-flex justify-content-between align-items-center gap-3 px-0 py-3">
        <button class="btn btn-link text-decoration-none flex-grow-1 text-start p-0 task-label" type="button"></button>
        <button class="btn btn-outline-danger btn-sm task-remove" type="button">Delete</button>
      </li>
    </template>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
