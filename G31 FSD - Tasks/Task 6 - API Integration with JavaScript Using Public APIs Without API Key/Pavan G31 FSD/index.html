<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pokémon Search App</title>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background Animation -->
    <div class="background"></div>

    <!-- Main Container -->
    <div class="container">

        <!-- Header -->
        <header>

            <h1>⚡ Pokémon Search App</h1>

            <p>
                Search any Pokémon using its
                <strong>Name</strong> or
                <strong>ID</strong>
            </p>

        </header>

        <!-- Search Section -->
        <section class="search-section">

            <input
                type="text"
                id="pokemonInput"
                placeholder="Enter Pokémon Name or ID">

            <button id="searchBtn">
                🔍 Search
            </button>

            <button id="randomBtn">
                🎲 Random
            </button>

        </section>

        <!-- Loading -->
        <div id="loading" class="loading hidden">

            <div class="spinner"></div>

            <p>Searching Pokémon...</p>

        </div>

        <!-- Error Message -->
        <div id="error" class="error hidden">

            <h3>❌ Pokémon Not Found</h3>

            <p>
                Please enter a valid Pokémon Name or ID.
            </p>

        </div>

        <!-- Pokémon Card -->
        <div id="pokemonCard" class="pokemon-card hidden">

            <!-- Image -->
            <div class="image-section">

                <img
                    id="pokemonImage"
                    src=""
                    alt="Pokemon Image">

            </div>

            <!-- Basic Details -->
            <div class="basic-info">

                <h2 id="pokemonName">
                    Pokémon Name
                </h2>

                <p>
                    <strong>ID :</strong>
                    <span id="pokemonId"></span>
                </p>

                <p>
                    <strong>Height :</strong>
                    <span id="pokemonHeight"></span>
                </p>

                <p>
                    <strong>Weight :</strong>
                    <span id="pokemonWeight"></span>
                </p>

            </div>

            <!-- Type -->
            <div class="type-section">

                <h3>Type</h3>

                <div id="pokemonTypes"
                    class="type-container">

                </div>

            </div>

            <!-- Abilities -->
            <div class="ability-section">

                <h3>Abilities</h3>

                <ul id="pokemonAbilities">

                </ul>

            </div>

            <!-- Stats -->
            <div class="stats-section">

                <h3>Base Stats</h3>

                <div id="pokemonStats">

                </div>

            </div>

        </div>

        <!-- Footer -->
        <footer>

            <p>
                Powered by
                <strong>PokéAPI</strong>
            </p>

        </footer>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
