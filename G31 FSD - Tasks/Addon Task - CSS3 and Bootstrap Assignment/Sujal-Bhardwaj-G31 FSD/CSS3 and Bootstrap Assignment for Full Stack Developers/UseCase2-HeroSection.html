<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* Hero Section */
        .hero{
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: white;
        }

        /* Image Placeholder */
        .hero-image{
            background-color: white;
            color: black;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        /* Button Hover Effects */
        .btn-primary-custom:hover{
            transform: translateY(-3px);
            transition: 0.3s;
        }

        .btn-secondary-custom:hover{
            transform: translateY(-3px);
            transition: 0.3s;
        }

    </style>
</head>
<body>

    <!-- Hero Section Start -->

    <section class="hero">

        <div class="container">

            <div class="row align-items-center">

                <!-- Left Content -->

                <div class="col-lg-6 text-center text-lg-start">

                    <h1 class="display-4 fw-bold">
                        Build Modern Web Applications
                    </h1>

                    <p class="lead my-4">
                        Learn Full Stack Development with HTML,
                        CSS, Bootstrap, JavaScript, React, Node.js
                        and Database Technologies.
                    </p>

                    <button class="btn btn-warning btn-lg me-2 btn-primary-custom">
                        Get Started
                    </button>

                    <button class="btn btn-outline-light btn-lg btn-secondary-custom">
                        Learn More
                    </button>

                </div>

                <!-- Right Content -->

                <div class="col-lg-6 mt-5 mt-lg-0">

                    <div class="hero-image">
                        IMAGE PLACEHOLDER
                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Hero Section End -->

</body>
</html>
