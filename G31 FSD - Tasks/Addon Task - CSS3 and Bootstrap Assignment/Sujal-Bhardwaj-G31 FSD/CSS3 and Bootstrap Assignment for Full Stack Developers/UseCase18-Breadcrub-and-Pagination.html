<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Breadcrumb and Pagination</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    transition:0.4s;
}

/* Main Card */
.navigation-card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Breadcrumb */
.breadcrumb-item a{
    text-decoration:none;
}

/* Pagination Hover */
.page-link{
    transition:0.3s;
}

.page-link:hover{
    transform:translateY(-2px);
}

/* Dark Mode */
.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .navigation-card{
    background:#1f1f1f;
    color:white;
}

.dark-mode .breadcrumb-item a{
    color:#0d6efd;
}

.dark-mode .page-link{
    background:#2b2b2b;
    color:white;
    border-color:#444;
}

.dark-mode .page-item.active .page-link{
    background:#0d6efd;
    border-color:#0d6efd;
}

</style>
</head>
<body>

<div class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">
            Breadcrumb & Pagination Example
        </h2>

        <button id="darkBtn" class="btn btn-dark">
            🌙 Dark Mode
        </button>

    </div>

    <div class="navigation-card">

        <!-- Breadcrumb Navigation -->
        <h4 class="mb-3">Breadcrumb Navigation</h4>

        <nav aria-label="breadcrumb">

            <ol class="breadcrumb">

                <li class="breadcrumb-item">
                    <a href="#">Home</a>
                </li>

                <li class="breadcrumb-item">
                    <a href="#">Products</a>
                </li>

                <li class="breadcrumb-item">
                    <a href="#">Electronics</a>
                </li>

                <li class="breadcrumb-item active"
                    aria-current="page">
                    Laptop
                </li>

            </ol>

        </nav>

        <hr>

        <!-- Listing Content -->
        <h4 class="mb-3">Product Listing</h4>

        <ul class="list-group mb-4">

            <li class="list-group-item">Laptop Item 1</li>
            <li class="list-group-item">Laptop Item 2</li>
            <li class="list-group-item">Laptop Item 3</li>
            <li class="list-group-item">Laptop Item 4</li>
            <li class="list-group-item">Laptop Item 5</li>

        </ul>

        <!-- Pagination -->
        <h4 class="mb-3">Pagination</h4>

        <nav>

            <ul class="pagination justify-content-center">

                <li class="page-item">
                    <a class="page-link" href="#">
                        Previous
                    </a>
                </li>

                <li class="page-item">
                    <a class="page-link" href="#">
                        1
                    </a>
                </li>

                <li class="page-item active">
                    <a class="page-link" href="#">
                        2
                    </a>
                </li>

                <li class="page-item">
                    <a class="page-link" href="#">
                        3
                    </a>
                </li>

                <li class="page-item">
                    <a class="page-link" href="#">
                        4
                    </a>
                </li>

                <li class="page-item">
                    <a class="page-link" href="#">
                        Next
                    </a>
                </li>

            </ul>

        </nav>

    </div>

</div>

<script>

// Dark Mode Toggle

const darkBtn = document.getElementById("darkBtn");

darkBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        darkBtn.innerHTML = "☀️ Light Mode";

        darkBtn.classList.remove("btn-dark");
        darkBtn.classList.add("btn-warning");

    }else{

        darkBtn.innerHTML = "🌙 Dark Mode";

        darkBtn.classList.remove("btn-warning");
        darkBtn.classList.add("btn-dark");

    }

});

</script>

</body>
</html>
