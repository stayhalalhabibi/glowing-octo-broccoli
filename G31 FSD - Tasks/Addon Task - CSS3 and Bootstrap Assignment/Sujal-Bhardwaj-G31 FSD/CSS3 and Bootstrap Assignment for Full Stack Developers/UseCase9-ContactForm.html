<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Form</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: #f4f6f9;
    transition: 0.4s;
}

/* Contact Form Card */
.contact-card{
    max-width: 700px;
    margin: auto;
    border: none;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    transition: 0.4s;
}

/* Form Heading */
.form-title{
    color: #0d6efd;
    font-weight: bold;
}

/* Input Focus Effect */
.form-control:focus{
    border-color: #0d6efd;
    box-shadow: 0 0 8px rgba(13,110,253,0.3);
}

/* Submit Button */
.btn-submit{
    width: 100%;
}

/* Dark Mode */
.dark-mode{
    background-color: #121212;
    color: white;
}

.dark-mode .contact-card{
    background-color: #1e1e1e;
    color: white;
}

.dark-mode .form-control{
    background-color: #2b2b2b;
    color: white;
    border-color: #444;
}

.dark-mode .form-control::placeholder{
    color: #bbb;
}

.dark-mode .form-title{
    color: #66b3ff;
}

.dark-mode .form-label{
    color: white;
}

</style>

</head>
<body>

<!-- Dark Mode Button -->
<div class="container mt-4 text-end">

    <button id="darkBtn" class="btn btn-dark">
        🌙 Dark Mode
    </button>

</div>

<!-- Contact Form -->
<div class="container py-5">

    <div class="card contact-card">

        <div class="card-body p-4">

            <h2 class="text-center form-title mb-4">
                Contact Us
            </h2>

            <form>

                <!-- Name -->
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text"
                           class="form-control"
                           placeholder="Enter your name"
                           required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email"
                           class="form-control"
                           placeholder="Enter your email"
                           required>
                </div>

                <!-- Subject -->
                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text"
                           class="form-control"
                           placeholder="Enter subject"
                           required>
                </div>

                <!-- Message -->
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control"
                              rows="5"
                              placeholder="Write your message here..."
                              required></textarea>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit"
                            class="btn btn-primary btn-submit">
                        Send Message
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

<!-- Dark Mode JavaScript -->
<script>

const darkBtn = document.getElementById("darkBtn");

darkBtn.addEventListener("click", function(){

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        darkBtn.innerHTML = "☀️ Light Mode";

        darkBtn.classList.remove("btn-dark");
        darkBtn.classList.add("btn-warning");

    }else{

        darkBtn.innerHTML = "🌙 Dark Mode";

        darkBtn.classList.remove("btn-warning");
        darkBtn.classList.add("btn-dark");
    }

});

</script>

</body>
</html>
