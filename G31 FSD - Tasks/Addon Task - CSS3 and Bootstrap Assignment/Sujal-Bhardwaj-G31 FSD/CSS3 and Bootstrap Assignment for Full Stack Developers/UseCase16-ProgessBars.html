<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skill Progress Bars</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    transition:0.4s;
}

/* Progress Card */
.skill-card{
    max-width:800px;
    margin:auto;
    padding:30px;
    border-radius:15px;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Custom Progress Bar Colors */
.html-bar{
    background:#e44d26;
}

.css-bar{
    background:#264de4;
}

.bootstrap-bar{
    background:#7952b3;
}

.js-bar{
    background:#f7df1e;
    color:black;
}

.csharp-bar{
    background:#68217a;
}

/* Hover Effect */
.progress{
    height:25px;
    transition:0.3s;
}

.progress:hover{
    transform:scale(1.02);
}

/* Dark Mode */
.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .skill-card{
    background:#1f1f1f;
    color:white;
}

</style>

</head>
<body>

<div class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">
            Skill Progress Tracker
        </h2>

        <button id="darkBtn" class="btn btn-dark">
            🌙 Dark Mode
        </button>

    </div>

    <!-- Skill Card -->
    <div class="skill-card">

        <!-- HTML -->
        <label class="fw-bold mb-2">
            HTML - 95%
        </label>

        <div class="progress mb-4">

            <div class="progress-bar html-bar"
                 style="width:95%;">
                95%
            </div>

        </div>

        <!-- CSS -->
        <label class="fw-bold mb-2">
            CSS - 90%
        </label>

        <div class="progress mb-4">

            <div class="progress-bar css-bar"
                 style="width:90%;">
                90%
            </div>

        </div>

        <!-- Bootstrap -->
        <label class="fw-bold mb-2">
            Bootstrap - 85%
        </label>

        <div class="progress mb-4">

            <div class="progress-bar bootstrap-bar"
                 style="width:85%;">
                85%
            </div>

        </div>

        <!-- JavaScript -->
        <label class="fw-bold mb-2">
            JavaScript - 80%
        </label>

        <div class="progress mb-4">

            <div class="progress-bar js-bar"
                 style="width:80%;">
                80%
            </div>

        </div>

        <!-- C# -->
        <label class="fw-bold mb-2">
            C# - 75%
        </label>

        <div class="progress">

            <div class="progress-bar csharp-bar"
                 style="width:75%;">
                75%
            </div>

        </div>

    </div>

</div>

<script>

// Dark Mode Toggle

const darkBtn = document.getElementById("darkBtn");

darkBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        darkBtn.innerHTML = "☀️ Light Mode";

        darkBtn.classList.remove("btn-dark");
        darkBtn.classList.add("btn-warning");

    }else{

        darkBtn.innerHTML = "🌙 Dark Mode";

        darkBtn.classList.remove("btn-warning");
        darkBtn.classList.add("btn-dark");

    }

});

</script>

</body>
</html>
