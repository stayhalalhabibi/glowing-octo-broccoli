<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Profile Card */
        .profile-card{
            width: 350px;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        /* Hover Effect */
        .profile-card:hover{
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Profile Image */
        .profile-img{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0d6efd;
            margin-top: 20px;
        }

        /* Follow Button */
        .btn-follow:hover{
            background-color: #0b5ed7;
        }

    </style>
</head>
<body>

    <!-- Profile Card -->
    <div class="card profile-card text-center">

        <!-- Profile Image -->
        <img src="https://tse2.mm.bing.net/th/id/OIP.U0lavRZhl9Y5-e_-UiptAwHaHa?pid=Api&h=220&P=0"
             alt="Profile Image"
             class="profile-img mx-auto">

        <div class="card-body">

            <!-- User Name -->
            <h3 class="card-title">
                Sujal Bhardwaj
            </h3>

            <!-- User Role -->
            <h6 class="text-primary mb-3">
                Full Stack Developer
            </h6>

            <!-- Short Bio -->
            <p class="card-text">
                Passionate Full Stack Developer with skills in
                HTML, CSS, Bootstrap, JavaScript, Java, and DBMS.
                Loves building modern and responsive web applications.
            </p>

            <!-- Follow Button -->
            <button class="btn btn-primary btn-follow px-4">
                Follow
            </button>

        </div>

    </div>

</body>
</html>
