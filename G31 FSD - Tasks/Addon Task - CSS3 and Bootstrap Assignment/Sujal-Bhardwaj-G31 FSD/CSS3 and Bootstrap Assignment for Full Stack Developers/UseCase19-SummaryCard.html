<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Summary Card</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    transition:0.4s;
}

/* Order Card */
.order-card{
    max-width:500px;
    margin:auto;
    border:none;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.order-card:hover{
    transform:translateY(-5px);
}

.card-header{
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

.checkout-btn{
    width:100%;
    padding:12px;
    font-size:18px;
}

/* Dark Mode */
.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .order-card{
    background:#1f1f1f;
    color:white;
}

.dark-mode .list-group-item{
    background:#2a2a2a;
    color:white;
    border-color:#444;
}

</style>

</head>
<body>

<div class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">
            Order Summary
        </h2>

        <button id="darkBtn" class="btn btn-dark">
            🌙 Dark Mode
        </button>

    </div>

    <!-- Order Summary Card -->
    <div class="card order-card">

        <div class="card-header bg-primary text-white">
            Order Details
        </div>

        <div class="card-body">

            <!-- Product Name -->
            <div class="d-flex justify-content-between mb-3">
                <strong>Product:</strong>
                <span>Wireless Headphones</span>
            </div>

            <!-- Quantity -->
            <div class="d-flex justify-content-between mb-3">
                <strong>Quantity:</strong>
                <span>2</span>
            </div>

            <!-- Price -->
            <div class="d-flex justify-content-between mb-3">
                <strong>Price:</strong>
                <span>₹2,500</span>
            </div>

            <!-- Discount -->
            <div class="d-flex justify-content-between mb-3">
                <strong>Discount:</strong>
                <span class="text-success">10%</span>
            </div>

            <hr>

            <!-- Total -->
            <div class="d-flex justify-content-between mb-4">
                <h5>Total Amount</h5>
                <h5 class="text-primary">₹4,500</h5>
            </div>

            <!-- Checkout Button -->
            <button class="btn btn-success checkout-btn"
                    onclick="checkoutOrder()">
                Proceed to Checkout
            </button>

        </div>

    </div>

</div>

<script>

// Checkout Function
function checkoutOrder(){
    alert("Order Placed Successfully!");
}

// Dark Mode Toggle
const darkBtn = document.getElementById("darkBtn");

darkBtn.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        darkBtn.innerHTML="☀️ Light Mode";
        darkBtn.classList.remove("btn-dark");
        darkBtn.classList.add("btn-warning");

    }else{

        darkBtn.innerHTML="🌙 Dark Mode";
        darkBtn.classList.remove("btn-warning");
        darkBtn.classList.add("btn-dark");

    }

});

</script>

</body>
</html>
