<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap Alert Messages</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f4f6f9;
    transition:0.4s;
}

.alert-container{
    max-width:800px;
    margin:auto;
}

/* Hover Effect */
.alert{
    transition:0.3s;
}

.alert:hover{
    transform:translateY(-3px);
}

/* Dark Mode */
.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .alert{
    opacity:0.95;
}

</style>

</head>
<body>

<div class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">
            Bootstrap Alert Messages
        </h2>

        <button id="darkBtn" class="btn btn-dark">
            🌙 Dark Mode
        </button>

    </div>

    <div class="alert-container">

        <!-- Success Alert -->
        <div class="alert alert-success alert-dismissible fade show">

            <i class="bi bi-check-circle-fill"></i>

            <strong>Success!</strong>

            Your operation was completed successfully.

            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert">
            </button>

        </div>

        <!-- Error Alert -->
        <div class="alert alert-danger alert-dismissible fade show">

            <i class="bi bi-x-circle-fill"></i>

            <strong>Error!</strong>

            Something went wrong. Please try again.

            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert">
            </button>

        </div>

        <!-- Warning Alert -->
        <div class="alert alert-warning alert-dismissible fade show">

            <i class="bi bi-exclamation-triangle-fill"></i>

            <strong>Warning!</strong>

            Your password will expire soon.

            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert">
            </button>

        </div>

        <!-- Info Alert -->
        <div class="alert alert-info alert-dismissible fade show">

            <i class="bi bi-info-circle-fill"></i>

            <strong>Information!</strong>

            New updates are available.

            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert">
            </button>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// Dark Mode Toggle

const darkBtn = document.getElementById("darkBtn");

darkBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        darkBtn.innerHTML = "☀️ Light Mode";

        darkBtn.classList.remove("btn-dark");
        darkBtn.classList.add("btn-warning");

    }else{

        darkBtn.innerHTML = "🌙 Dark Mode";

        darkBtn.classList.remove("btn-warning");
        darkBtn.classList.add("btn-dark");

    }

});

</script>

</body>
</html>
