<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Card</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background-color:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    /* Product Card */
    .product-card{
        width:320px;
        border:none;
        border-radius:15px;
        overflow:hidden;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
        transition:0.4s;
    }

    /* Hover Effect */
    .product-card:hover{
        transform:translateY(-10px);
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    /* Product Image */
    .product-card img{
        height:220px;
        object-fit:cover;
    }

    /* Price Styling */
    .price{
        font-size:24px;
        font-weight:bold;
        color:#198754;
    }

    /* Button Hover */
    .btn-cart:hover{
        background-color:#0b5ed7;
    }

</style>
</head>
<body>

<div class="card product-card">

    <!-- Product Image -->
    <img src="https://img.magnific.com/premium-photo/photo-wireless-headphones_1029469-18128.jpg"
         class="card-img-top"
         alt="Product Image">

    <div class="card-body text-center">

        <!-- Product Badge -->
        <span class="badge bg-danger mb-2">
            New Arrival
        </span>

        <!-- Product Title -->
        <h4 class="card-title">
            Wireless Headphones
        </h4>

        <!-- Product Price -->
        <p class="price">
            ₹2,999
        </p>

        <!-- Product Rating -->
        <p>
            ⭐⭐⭐⭐⭐
            <span class="text-muted">(4.8/5)</span>
        </p>

        <!-- Add To Cart Button -->
        <button class="btn btn-primary btn-cart w-100">
            Add to Cart
        </button>

    </div>

</div>

</body>
</html>
