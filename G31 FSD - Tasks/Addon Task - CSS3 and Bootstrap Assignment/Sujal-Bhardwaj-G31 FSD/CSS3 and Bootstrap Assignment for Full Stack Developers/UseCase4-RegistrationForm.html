<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Registration Card */
        .register-card{
            width: 500px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        /* Input Focus Styling */
        .form-control:focus{
            border-color: #0d6efd;
            box-shadow: 0 0 8px rgba(13,110,253,0.4);
        }

        /* Register Button Hover */
        .btn-register:hover{
            background-color: #0b5ed7;
        }

    </style>
</head>
<body>

<div class="register-card">

    <h2 class="text-center mb-4">
        User Registration
    </h2>

    <form>

        <!-- Full Name -->
        <div class="mb-3">
            <label class="form-label">
                Full Name
            </label>

            <input type="text"
                   class="form-control"
                   placeholder="Enter your full name"
                   required>

            <div class="form-text">
                Enter your first and last name.
            </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">
                Email Address
            </label>

            <input type="email"
                   class="form-control"
                   placeholder="Enter your email"
                   required>

            <div class="form-text">
                We'll never share your email.
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">
                Password
            </label>

            <input type="password"
                   class="form-control"
                   placeholder="Create password"
                   required>

            <div class="form-text">
                Minimum 8 characters recommended.
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label class="form-label">
                Confirm Password
            </label>

            <input type="password"
                   class="form-control"
                   placeholder="Re-enter password"
                   required>

            <div class="invalid-feedback">
                Passwords do not match.
            </div>
        </div>

        <!-- Terms Checkbox -->
        <div class="form-check mb-3">

            <input class="form-check-input"
                   type="checkbox"
                   id="terms"
                   required>

            <label class="form-check-label"
                   for="terms">

                I agree to the Terms & Conditions

            </label>

        </div>

        <!-- Register Button -->
        <div class="d-grid">

            <button type="submit"
                    class="btn btn-primary btn-register">

                Register

            </button>

        </div>

    </form>

</div>

</body>
</html>
