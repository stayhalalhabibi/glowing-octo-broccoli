<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Use Case 6 - Product Card</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f8f9fa;
        }
        .product-card{
            transition: all 0.3s ease-in-out;
        }
        .product-card:hover{
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .price{
            font-size: 1.5rem;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card product-card">
                    <!--Product image-->
                    <img src="https://picsum.photos/400/250" class="card-img-top" alt="Product Image">
                    <div class="card-body">
                        <!--Product Title-->
                        <h4 class="card-title">
                            Wireless Headphones
                        </h4>
                        <!--Rating-->
                        <span class="badge bg-warning text-dark">⭐ 4.5/5</span>
                        <!--Price-->
                        <p class="price mt-3">$199</p>
                        <p class="card-text">
                            premium quality wireless headphones with noise cancellation.
                            <!--Button-->
                            <button class="btn btn-primary w-100">Add to Cart</button>
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
