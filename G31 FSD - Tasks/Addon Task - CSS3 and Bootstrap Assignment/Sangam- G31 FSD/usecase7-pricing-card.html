<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f8f9fa;
        }

        .pricing-card{
            transition: all 0.3s ease;
        }

        .pricing-card:hover{
            transform: translateY(-10px);
        }

        .recommended{
            border: 3px solid #0d6efd;
        }
    </style>
</head>
<body>

<div class="container my-5">

    <h1 class="text-center mb-5">Pricing Plans</h1>

    <div class="row g-4">

        <!-- Basic Plan -->
        <div class="col-md-4">
            <div class="card pricing-card shadow h-100">

                <div class="card-header text-center">
                    <h3>Basic</h3>
                </div>

                <div class="card-body text-center">

                    <h2 class="text-primary">$9<span class="fs-6">/month</span></h2>

                    <ul class="list-group list-group-flush my-4">
                        <li class="list-group-item">1 User</li>
                        <li class="list-group-item">10 GB Storage</li>
                        <li class="list-group-item">Email Support</li>
                    </ul>

                    <button class="btn btn-outline-primary">
                        Choose Plan
                    </button>

                </div>
            </div>
        </div>


        <!-- Standard Plan -->
        <div class="col-md-4">
            <div class="card pricing-card shadow h-100 recommended">

                <div class="card-header bg-primary text-white text-center">
                    <h3>Standard</h3>
                    <span class="badge bg-warning text-dark">
                        Recommended
                    </span>
                </div>

                <div class="card-body text-center">

                    <h2 class="text-primary">$19<span class="fs-6">/month</span></h2>

                    <ul class="list-group list-group-flush my-4">
                        <li class="list-group-item">5 Users</li>
                        <li class="list-group-item">50 GB Storage</li>
                        <li class="list-group-item">Priority Support</li>
                    </ul>

                    <button class="btn btn-primary">
                        Choose Plan
                    </button>

                </div>
            </div>
        </div>


        <!-- Premium Plan -->
        <div class="col-md-4">
            <div class="card pricing-card shadow h-100">

                <div class="card-header text-center">
                    <h3>Premium</h3>
                </div>

                <div class="card-body text-center">

                    <h2 class="text-primary">$49<span class="fs-6">/month</span></h2>

                    <ul class="list-group list-group-flush my-4">
                        <li class="list-group-item">Unlimited Users</li>
                        <li class="list-group-item">200 GB Storage</li>
                        <li class="list-group-item">24/7 Support</li>
                    </ul>

                    <button class="btn btn-outline-primary">
                        Choose Plan
                    </button>

                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
