<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stayhalal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="Addon_p_Task.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Halal_coders</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDropdown"
          aria-controls="navbarNavDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Features</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Pricing</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Development
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li>
                  <a class="dropdown-item" href="#">Something else here</a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="skills-section py-5">
      <div class="container">
        <div class="text-center mb-5">
          <h2 class="fw-bold">My Skills</h2>
          <p class="text-light">Current skill proficiency levels</p>
        </div>

        <!-- HTML -->
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <span>HTML</span>
            <span>95%</span>
          </div>
          <div class="progress">
            <div class="progress-bar html-skill" style="width: 95%">95%</div>
          </div>
        </div>

        <!-- CSS -->
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <span>CSS</span>
            <span>90%</span>
          </div>
          <div class="progress">
            <div class="progress-bar css-skill" style="width: 90%">90%</div>
          </div>
        </div>

        <!-- Bootstrap -->
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <span>Bootstrap</span>
            <span>85%</span>
          </div>
          <div class="progress">
            <div class="progress-bar bootstrap-skill" style="width: 85%">
              85%
            </div>
          </div>
        </div>

        <!-- JavaScript -->
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <span>JavaScript</span>
            <span>70%</span>
          </div>
          <div class="progress">
            <div class="progress-bar js-skill" style="width: 70%">70%</div>
          </div>
        </div>

        <!-- C# -->
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <span>C#</span>
            <span>65%</span>
          </div>
          <div class="progress">
            <div class="progress-bar csharp-skill" style="width: 65%">65%</div>
          </div>
        </div>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
