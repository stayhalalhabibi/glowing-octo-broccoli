<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stayhalal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="Addon_o_Task.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Friends_Furniture</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDropdown"
          aria-controls="navbarNavDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Features</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Pricing</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Development
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li>
                  <a class="dropdown-item" href="#">Something else here</a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="gallery-section py-5">
      <div class="container">
        <div class="text-center mb-5">
          <h2 class="fw-bold">Furniture Gallery</h2>
          <p class="text-light">Explore our premium furniture collection.</p>
        </div>

        <div class="row g-4">
          
          <div class="col-md-4 col-sm-6">
            <div class="gallery-card">
              <img src="./images/y.jpg" class="img-fluid" alt="Sofa" />
              <div class="caption">Luxury Sofa</div>
            </div>
          </div>

          <div class="col-md-4 col-sm-6">
            <div class="gallery-card">
              <img src="./images/r.jpg" class="img-fluid" alt="Bed" />
              <div class="caption">Modern Bed</div>
            </div>
          </div>

          <div class="col-md-4 col-sm-6">
            <div class="gallery-card">
              <img src="./images/q.jpg" class="img-fluid" alt="Table" />
              <div class="caption">Dining Table</div>
            </div>
          </div>

          <div class="col-md-4 col-sm-6">
            <div class="gallery-card">
              <img src="./images/s.jpg" class="img-fluid" alt="Chair" />
              <div class="caption">Comfort Chair</div>
            </div>
          </div>

          <div class="col-md-4 col-sm-6">
            <div class="gallery-card">
              <img
                src="./images/n.jpg"
                class="img-fluid"
                alt="Office Desk"
              />
              <div class="caption">Office Desk</div>
            </div>
          </div>

          <div class="col-md-4 col-sm-6">
            <div class="gallery-card">
              <img src="./images/u.jpg" class="img-fluid" alt="Cabinet" />
              <div class="caption">Wooden Cabinet</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
