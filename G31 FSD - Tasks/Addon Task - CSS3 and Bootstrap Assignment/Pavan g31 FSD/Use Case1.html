<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Pup - Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center brand-logo" href="#">
                <span class="logo-box">🐶</span>
                <span class="brand-text">Happy Pup</span>
            </a>

            <!-- Mobile Menu Button -->
            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse" id="navbarMenu">

                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link custom-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-link" href="#">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-link" href="#">Contact</a>
                    </li>
                </ul>

                <!-- Login Button -->
                <a href="#" class="btn login-btn">
                    Login
                </a>

            </div>

        </div>
    </nav>
    <!-- Navbar End -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
