<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Pup Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style4.css">
</head>
<body>

    <section class="register-section">

        <div class="container">

            <div class="register-card">

                <h2 class="text-center mb-4">
                    Create Happy Pup Account
                </h2>

                <form>

                    <!-- Full Name -->

                    <div class="mb-3">
                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            placeholder="Enter your full name">
                    </div>

                    <!-- Email -->

                    <div class="mb-3">
                        <label class="form-label">
                            Email Address
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            placeholder="Enter your email">
                    </div>

                    <!-- Password -->

                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            placeholder="Create password">
                    </div>

                    <!-- Confirm Password -->

                    <div class="mb-3">
                        <label class="form-label">
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            placeholder="Confirm password">
                    </div>

                    <!-- Terms -->

                    <div class="form-check mb-3">

                        <input
                            type="checkbox"
                            class="form-check-input"
                            id="terms">

                        <label
                            class="form-check-label"
                            for="terms">

                            I agree to the Terms & Conditions

                        </label>

                    </div>

                    <!-- Validation UI -->

                    <small class="validation-text">
                        * All fields are required
                    </small>

                    <!-- Register Button -->

                    <button
                        type="submit"
                        class="btn register-btn w-100 mt-3">

                        Register

                    </button>

                </form>

            </div>

        </div>

    </section>

    <script src="js/script4.js"></script>

</body>
</html>
