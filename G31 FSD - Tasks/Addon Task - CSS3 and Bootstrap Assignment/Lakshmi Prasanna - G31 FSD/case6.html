<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case 6 - Product Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="case6.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="product-card shadow rounded p-3 text-center">

    <div class="product-img mb-3">
      <span>📱</span>
    </div>

    <span class="badge bg-danger mb-2">50% OFF</span>

    <h4 class="fw-bold">Smartphone Pro</h4>
    <p class="text-muted">Latest smartphone with amazing camera and battery life.</p>

    <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
      <span class="price text-danger fw-bold fs-4">₹15,999</span>
      <span class="text-muted text-decoration-line-through">₹31,999</span>
    </div>

    <div class="rating mb-3">
      ⭐⭐⭐⭐⭐
      <small class="text-muted">(128 reviews)</small>
    </div>

    <button class="btn btn-dark w-100">Add to Cart 🛒</button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
