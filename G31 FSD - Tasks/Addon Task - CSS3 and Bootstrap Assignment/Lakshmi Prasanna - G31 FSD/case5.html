<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case 5 - Profile Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="case5.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="profile-card text-center p-4 shadow rounded">

    <div class="profile-img mx-auto mb-3">
      <span>LP</span>
    </div>

    <h3 class="fw-bold">Lakshmi Prasanna</h3>
    <p class="role">Full Stack Developer</p>
    <p class="bio text-muted">Passionate developer who loves building beautiful and functional web applications.</p>

    <button class="btn btn-primary px-4 mt-2">Follow</button>

    <div class="stats d-flex justify-content-around mt-4">
      <div>
        <h5 class="fw-bold">120</h5>
        <small>Posts</small>
      </div>
      <div>
        <h5 class="fw-bold">340</h5>
        <small>Followers</small>
      </div>
      <div>
        <h5 class="fw-bold">180</h5>
        <small>Following</small>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
