<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f8f9fa;
        }

        .profile-card{
            max-width:350px;
            margin:50px auto;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .profile-card:hover{
            transform:translateY(-5px);
        }

        .profile-img{
            width:120px;
            height:120px;
            border-radius:50%;
            margin:20px auto 10px;
            display:block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card profile-card text-center">

        <img src="profile.jpg" alt="profile" class="profile-img">
             
             

        <div class="card-body">
            <h4 class="card-title">Narasimha Naidu</h4>

            <h6 class="text-muted">Web Developer</h6>

            <p class="card-text">
                Passionate about web development and creating responsive websites using HTML, CSS, JavaScript, and Bootstrap.
            </p>

            <button class="btn btn-primary">
                Follow
            </button>
        </div>

    </div>
</div>

</body>
</html>
