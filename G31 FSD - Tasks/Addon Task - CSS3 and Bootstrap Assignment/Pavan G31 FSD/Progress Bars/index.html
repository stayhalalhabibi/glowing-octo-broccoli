<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Pup Skills</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <img src="Img.png" class="paw-bg" alt="Background">

    <section class="skills-section py-5">

        <div class="container">

            <div class="text-center mb-5">

                <h1 class="section-title">
                    Happy Pup Team Skills
                </h1>

                <p class="section-subtitle">
                    Technology stack and expertise used to build modern pet care solutions.
                </p>

            </div>

            <div class="skills-card">

                <div class="skill-item">

                    <div class="skill-header">
                        <span>HTML</span>
                        <span>95%</span>
                    </div>

                    <div class="progress">
                        <div class="progress-bar html-bar"
                            style="width:95%">
                        </div>
                    </div>

                </div>

                <div class="skill-item">

                    <div class="skill-header">
                        <span>CSS</span>
                        <span>90%</span>
                    </div>

                    <div class="progress">
                        <div class="progress-bar css-bar"
                            style="width:90%">
                        </div>
                    </div>

                </div>

                <div class="skill-item">

                    <div class="skill-header">
                        <span>Bootstrap</span>
                        <span>88%</span>
                    </div>

                    <div class="progress">
                        <div class="progress-bar bootstrap-bar"
                            style="width:88%">
                        </div>
                    </div>

                </div>

                <div class="skill-item">

                    <div class="skill-header">
                        <span>JavaScript</span>
                        <span>80%</span>
                    </div>

                    <div class="progress">
                        <div class="progress-bar js-bar"
                            style="width:80%">
                        </div>
                    </div>

                </div>

                <div class="skill-item">

                    <div class="skill-header">
                        <span>C#</span>
                        <span>75%</span>
                    </div>

                    <div class="progress">
                        <div class="progress-bar csharp-bar"
                            style="width:75%">
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
