<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Pup Alerts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <img src="Img.png" class="paw-bg" alt="Background">

    <section class="alerts-section py-5">

        <div class="container">

            <div class="text-center mb-5">

                <h1 class="section-title">
                    Happy Pup Notifications
                </h1>

                <p class="section-subtitle">
                    Stay updated with important pet care information.
                </p>

            </div>

            <!-- Success -->

            <div class="alert alert-success alert-dismissible fade show custom-alert"
                role="alert">

                🐶 <strong>Success!</strong>
                Appointment booked successfully.

                <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
                </button>

            </div>

            <!-- Error -->

            <div class="alert alert-danger alert-dismissible fade show custom-alert"
                role="alert">

                ❌ <strong>Error!</strong>
                Payment could not be processed.

                <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
                </button>

            </div>

            <!-- Warning -->

            <div class="alert alert-warning alert-dismissible fade show custom-alert"
                role="alert">

                ⚠ <strong>Warning!</strong>
                Vaccination due in 3 days.

                <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
                </button>

            </div>

            <!-- Info -->

            <div class="alert alert-info alert-dismissible fade show custom-alert"
                role="alert">

                ℹ <strong>Information!</strong>
                New grooming packages are now available.

                <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
                </button>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
