<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Pup Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <img src="Img.png" class="paw-bg" alt="Background">

    <section class="dashboard-section py-5">

        <div class="container">

            <div class="text-center mb-5">

                <h1 class="section-title">
                    Happy Pup Dashboard
                </h1>

                <p class="section-subtitle">
                    Quick overview of your pet care business.
                </p>

            </div>

            <div class="row g-4">

                <!-- Card 1 -->

                <div class="col-lg-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="icon">
                            🐶
                        </div>

                        <h2 class="counter" data-target="2540">
                            0
                        </h2>

                        <h5>Total Pet Owners</h5>

                    </div>

                </div>

                <!-- Card 2 -->

                <div class="col-lg-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="icon">
                            📅
                        </div>

                        <h2 class="counter" data-target="1875">
                            0
                        </h2>

                        <h5>Total Bookings</h5>

                    </div>

                </div>

                <!-- Card 3 -->

                <div class="col-lg-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="icon">
                            💰
                        </div>

                        <h2 class="counter" data-target="425000">
                            0
                        </h2>

                        <h5>Revenue</h5>

                    </div>

                </div>

                <!-- Card 4 -->

                <div class="col-lg-3 col-md-6">

                    <div class="dashboard-card">

                        <div class="icon">
                            ⏳
                        </div>

                        <h2 class="counter" data-target="48">
                            0
                        </h2>

                        <h5>Pending Appointments</h5>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
