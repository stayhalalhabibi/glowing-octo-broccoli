<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Happy Pup Order Summary</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <img src="Img.png"
        class="paw-bg"
        alt="Background">

    <section class="order-section">

        <div class="container">

            <div class="text-center mb-5">

                <h1 class="section-title">
                    Order Summary
                </h1>

                <p class="section-subtitle">
                    Review your purchase before checkout.
                </p>

            </div>

            <div class="row justify-content-center">

                <div class="col-lg-6">

                    <div class="order-card">

                        <img src="Img1.jpg"
                            class="product-image"
                            alt="Dog Food">

                        <h3 class="product-title">
                            Premium Dog Food
                        </h3>

                        <div class="summary-row">

                            <span>Quantity</span>

                            <span>2</span>

                        </div>

                        <div class="summary-row">

                            <span>Price</span>

                            <span>₹1,800</span>

                        </div>

                        <div class="summary-row">

                            <span>Discount</span>

                            <span class="discount">
                                -₹200
                            </span>

                        </div>

                        <hr>

                        <div class="summary-row total">

                            <span>Total Amount</span>

                            <span>₹1,600</span>

                        </div>

                        <button class="btn checkout-btn w-100">

                            Proceed to Checkout

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
