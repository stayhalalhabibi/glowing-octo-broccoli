<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Pup - Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Paw Background -->
    <img src="Img.png"
         alt="Paw Background"
         class="paw-bg">

    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg shadow-sm">

        <div class="container">

            <!-- Brand Logo -->
            <a class="navbar-brand d-flex align-items-center brand-logo" href="#">

                <span class="logo-box">🐶</span>

                <div>
                    <div class="brand-text">Happy Pup</div>

                    <small class="brand-tagline">
                        Your Pet's Best Friend
                    </small>
                </div>

            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="navbarMenu">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link custom-link active-link" href="#">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-link" href="#">
                            About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-link" href="#">
                            Services
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link custom-link" href="#">
                            Contact
                        </a>
                    </li>

                </ul>

                <div class="d-flex align-items-center">

                    <a href="#" class="btn login-btn">
                        Login
                    </a>

                    <a href="#" class="btn signup-btn">
                        Sign Up
                    </a>

                </div>

            </div>

        </div>

    </nav>
    <!-- Navbar End -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
