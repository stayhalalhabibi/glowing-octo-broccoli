<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Pup Modal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <img src="Img.png" class="paw-bg" alt="Background">

    <section class="modal-section">

        <div class="container text-center">

            <h1 class="section-title mb-3">
                Happy Pup Services
            </h1>

            <p class="section-subtitle mb-4">
                Book your pet's next grooming session.
            </p>

            <!-- Open Button -->

            <button
                class="btn open-modal-btn"
                data-bs-toggle="modal"
                data-bs-target="#bookingModal">

                Book Appointment

            </button>

        </div>

    </section>

    <!-- Modal -->

    <div class="modal fade"
        id="bookingModal"
        tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Book Grooming Appointment
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <p>
                        Would you like to schedule a grooming session for your furry friend?
                    </p>

                    <hr>

                    <p>
                        <strong>Service:</strong>
                        Premium Grooming Package
                    </p>

                    <p>
                        <strong>Price:</strong>
                        ₹999
                    </p>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Close

                    </button>

                    <button
                        type="button"
                        class="btn save-btn">

                        Save Booking

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
