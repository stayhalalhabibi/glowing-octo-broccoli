<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Pup Contact Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <img src="Img.png" class="paw-bg" alt="Paw Background">

    <section class="contact-section py-5">

        <div class="container">

            <div class="text-center mb-5">

                <h1 class="section-title">
                    Get In Touch With Happy Pup
                </h1>

                <p class="section-subtitle">
                    We'd love to hear from you and your furry friend.
                </p>

            </div>

            <div class="row align-items-center g-4">

                <!-- Left Side -->

                <div class="col-lg-5">

                    <div class="contact-info">

                        <img src="Img1.avif" alt="Contact Us" class="img-fluid contact-image">

                        <div class="info-box mt-4">

                            <h4>Contact Information</h4>

                            <p>
                                📞 +91 98765 43210
                            </p>

                            <p>
                                📧 support@happypup.com
                            </p>

                            <p>
                                📍 Happy Pup Pet Care Center<br>
                                Tirupati, Andhra Pradesh
                            </p>

                        </div>

                    </div>

                </div>

                <!-- Right Side -->

                <div class="col-lg-7">

                    <div class="contact-card">

                        <form>

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
                                    class="form-control"
                                    placeholder="Enter your name"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email"
                                    class="form-control"
                                    placeholder="Enter your email"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Subject
                                </label>

                                <input type="text"
                                    class="form-control"
                                    placeholder="Enter subject"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Message
                                </label>

                                <textarea
                                    class="form-control"
                                    rows="5"
                                    placeholder="Write your message..."
                                    required></textarea>

                            </div>

                            <div class="text-center">

                                <button type="submit" class="btn submit-btn">
                                    Send Message
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
