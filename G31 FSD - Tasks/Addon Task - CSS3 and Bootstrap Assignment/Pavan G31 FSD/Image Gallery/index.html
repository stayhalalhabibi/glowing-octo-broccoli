<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Pup Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <img src="Img.png" class="paw-bg" alt="Background">

    <section class="gallery-section py-5">

        <div class="container">

            <div class="text-center mb-5">

                <h1 class="section-title">
                    Happy Pup Gallery
                </h1>

                <p class="section-subtitle">
                    Meet our adorable furry friends and featured products.
                </p>

            </div>

            <div class="row g-4">

                <div class="col-lg-4 col-md-6">

                    <div class="gallery-card">

                        <img src="Img1.avif" alt="Happy Pup Star">

                        <div class="caption">
                            Happy Pup Star
                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="gallery-card">

                        <img src="Img2.avif" alt="Buddy">

                        <div class="caption">
                            Buddy
                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="gallery-card">

                        <img src="Img3.avif" alt="Max">

                        <div class="caption">
                            Max
                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="gallery-card">

                        <img src="Img4.avif" alt="Bella">

                        <div class="caption">
                            Bella
                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="gallery-card">

                        <img src="Img5.avif" alt="Rocky">

                        <div class="caption">
                            Rocky
                        </div>

                    </div>

                </div>

                <div class="col-lg-4 col-md-6">

                    <div class="gallery-card">

                        <img src="Img6.avif" alt="Dog Food">

                        <div class="caption">
                            Scooby
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
