<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Happy Pup Navigation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <img src="Img.png"
        class="paw-bg"
        alt="Background">

    <section class="navigation-section">

        <div class="container">

            <div class="text-center mb-5">

                <h1 class="section-title">
                    Happy Pup Product Listing
                </h1>

                <p class="section-subtitle">
                    Browse our pet products using breadcrumb and pagination navigation.
                </p>

            </div>

            <div class="navigation-card">

                <!-- Breadcrumb -->

                <nav aria-label="breadcrumb">

                    <ol class="breadcrumb">

                        <li class="breadcrumb-item">
                            <a href="#">
                                Home
                            </a>
                        </li>

                        <li class="breadcrumb-item">
                            <a href="#">
                                Products
                            </a>
                        </li>

                        <li class="breadcrumb-item active"
                            aria-current="page">

                            Dog Food

                        </li>

                    </ol>

                </nav>

                <hr>

                <!-- Pagination -->

                <nav aria-label="Page navigation">

                    <ul class="pagination justify-content-center">

                        <li class="page-item">

                            <a class="page-link"
                                href="#">

                                Previous

                            </a>

                        </li>

                        <li class="page-item">

                            <a class="page-link"
                                href="#">

                                1

                            </a>

                        </li>

                        <li class="page-item active">

                            <a class="page-link"
                                href="#">

                                2

                            </a>

                        </li>

                        <li class="page-item">

                            <a class="page-link"
                                href="#">

                                3

                            </a>

                        </li>

                        <li class="page-item">

                            <a class="page-link"
                                href="#">

                                4

                            </a>

                        </li>

                        <li class="page-item">

                            <a class="page-link"
                                href="#">

                                Next

                            </a>

                        </li>

                    </ul>

                </nav>

            </div>

        </div>

    </section>

</body>

</html>
