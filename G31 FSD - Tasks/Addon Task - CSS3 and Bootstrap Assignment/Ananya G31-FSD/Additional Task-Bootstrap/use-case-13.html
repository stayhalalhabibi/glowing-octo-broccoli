<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 13 - Modal Popup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
<h1 class="h3 mb-3">Use Case 13 - Modal Popup</h1>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#demoModal">Open Modal</button>

<div class="modal fade" id="demoModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header"><h2 class="h5 modal-title mb-0">Modal Title</h2><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">This is a simple Bootstrap modal.</div>
<div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button><button type="button" class="btn btn-primary">Save</button></div>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
