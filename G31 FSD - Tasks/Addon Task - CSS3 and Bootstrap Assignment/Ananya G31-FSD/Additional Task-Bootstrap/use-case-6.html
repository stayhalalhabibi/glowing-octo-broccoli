<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 6 - Product Card</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
<h1 class="h3 mb-3">Use Case 6 - Product Card</h1>
<div class="card" style="max-width: 350px;">
<img src="images/image.jpg" class="card-img-top" alt="Product image">
<div class="card-body text-center">
<h2 class="h5">Wireless Headphones</h2>
<p class="text-success fw-bold">₹2,999</p>
<span class="badge bg-warning text-dark">4.5 Rating</span>
<div class="mt-3"><button class="btn btn-primary">Add to Cart</button></div>
</div>
</div>
</div>

</body>
</html>
