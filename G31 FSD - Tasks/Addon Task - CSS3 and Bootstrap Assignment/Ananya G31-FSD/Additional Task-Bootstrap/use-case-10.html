<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 10 - Responsive Table</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
<h1 class="h3 mb-3">Use Case 10 - Responsive Table</h1>
<input type="text" id="searchInput" class="form-control mb-3" placeholder="Search employee by name" onkeyup="searchEmployee()">
<div class="table-responsive">
<table class="table table-bordered bg-white" id="employeeTable">
<thead class="table-dark"><tr><th>Employee ID</th><th>Name</th><th>Department</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
<tbody>
<tr><td>101</td><td>John</td><td>HR</td><td>john@example.com</td><td><span class="badge bg-success">Active</span></td><td><button class="btn btn-sm btn-primary">Edit</button></td></tr>
<tr><td>102</td><td>Smith</td><td>IT</td><td>smith@example.com</td><td><span class="badge bg-danger">Inactive</span></td><td><button class="btn btn-sm btn-warning">Edit</button></td></tr>
<tr><td>103</td><td>David</td><td>Finance</td><td>david@example.com</td><td><span class="badge bg-success">Active</span></td><td><button class="btn btn-sm btn-primary">Edit</button></td></tr>
</tbody>
</table>
</div>
</div>

<script src="js/script.js"></script>
</body>
</html>
