<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 9 - Contact Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
<h1 class="h3 mb-3">Use Case 9 - Contact Form</h1>
<div class="row justify-content-center">
<div class="col-lg-7">
<form class="border rounded bg-white p-3" onsubmit="return submitContact(event)">
<div class="mb-3"><label class="form-label">Name</label><input type="text" id="contactName" class="form-control"></div>
<div class="mb-3"><label class="form-label">Email</label><input type="email" id="contactEmail" class="form-control"></div>
<div class="mb-3"><label class="form-label">Subject</label><input type="text" id="contactSubject" class="form-control"></div>
<div class="mb-3"><label class="form-label">Message</label><textarea id="contactMessage" rows="4" class="form-control"></textarea></div>
<button type="submit" class="btn btn-success">Submit</button>
</form>
</div>
</div>
</div>

<script src="js/script.js"></script>
</body>
</html>
