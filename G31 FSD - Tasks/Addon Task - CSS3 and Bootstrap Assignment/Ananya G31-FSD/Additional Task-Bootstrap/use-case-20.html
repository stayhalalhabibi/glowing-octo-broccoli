<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 20 - Admin Sidebar Layout</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid">
<div class="row g-0">
<aside class="col-lg-2 admin-sidebar p-3 text-white">
<h1 class="h5 mb-4">Admin Panel</h1>
<div class="nav flex-column gap-1">
<a class="nav-link active" href="#">Dashboard</a>
<a class="nav-link" href="#">Users</a>
<a class="nav-link" href="#">Reports</a>
<a class="nav-link" href="#">Settings</a>
<button class="btn btn-danger mt-3" type="button">Logout</button>
</div>
</aside>

<main class="col-lg-10 p-4 bg-light min-vh-100">
<div class="mb-4 p-3 bg-white border rounded">
<h1 class="h3 mb-1">Dashboard Overview</h1>
<p class="mb-0">Simple admin layout for beginners.</p>
</div>
<div class="row g-3">
<div class="col-md-6 col-xl-3"><div class="card p-3"><strong>Total Users</strong><span>500</span></div></div>
<div class="col-md-6 col-xl-3"><div class="card p-3"><strong>Total Orders</strong><span>120</span></div></div>
<div class="col-md-6 col-xl-3"><div class="card p-3"><strong>Revenue</strong><span>₹12K</span></div></div>
<div class="col-md-6 col-xl-3"><div class="card p-3"><strong>Pending Tasks</strong><span>15</span></div></div>
</div>
</main>
</div>
</div>

</body>
</html>
