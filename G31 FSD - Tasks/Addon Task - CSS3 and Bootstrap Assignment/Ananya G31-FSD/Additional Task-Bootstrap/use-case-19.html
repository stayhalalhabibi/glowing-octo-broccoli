<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 19 - Order Summary Card</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
<h1 class="h3 mb-3">Use Case 19 - Order Summary Card</h1>
<div class="card p-3" style="max-width: 400px;">
<div class="d-flex justify-content-between mb-2"><span>Product</span><span>Wireless Headphones</span></div>
<div class="d-flex justify-content-between mb-2"><span>Quantity</span><span>1</span></div>
<div class="d-flex justify-content-between mb-2"><span>Price</span><span>₹2,999</span></div>
<div class="d-flex justify-content-between mb-2"><span>Discount</span><span>-₹500</span></div>
<hr>
<div class="d-flex justify-content-between fw-bold mb-3"><span>Total</span><span>₹2,499</span></div>
<button class="btn btn-success">Checkout</button>
</div>
</div>

</body>
</html>
