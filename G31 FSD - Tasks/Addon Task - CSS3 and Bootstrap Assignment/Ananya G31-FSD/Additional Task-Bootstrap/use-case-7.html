<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 7 - Pricing Cards</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
<h1 class="h3 mb-3">Use Case 7 - Pricing Cards</h1>
<div class="row g-3">
<div class="col-md-4"><div class="card p-3 text-center"><h2 class="h5">Basic</h2><h3>₹499</h3><p>For one user</p><button class="btn btn-outline-primary">Choose Plan</button></div></div>
<div class="col-md-4"><div class="card p-3 text-center"><h2 class="h5">Standard</h2><h3>₹999</h3><p>For small teams</p><button class="btn btn-primary">Choose Plan</button></div></div>
<div class="col-md-4"><div class="card p-3 text-center"><h2 class="h5">Premium</h2><h3>₹1,999</h3><p>For larger teams</p><button class="btn btn-outline-primary">Choose Plan</button></div></div>
</div>
</div>

</body>
</html>
