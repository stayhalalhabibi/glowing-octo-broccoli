<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 4 - Registration Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
<h1 class="h3 mb-3">Use Case 4 - Registration Form</h1>
<div class="row justify-content-center">
<div class="col-lg-6">
<form class="border rounded bg-white p-3" onsubmit="return validateRegister(event)">
<div class="mb-3"><label class="form-label">Full Name</label><input type="text" id="registerName" class="form-control"></div>
<div class="mb-3"><label class="form-label">Email</label><input type="email" id="registerEmail" class="form-control"></div>
<div class="mb-3"><label class="form-label">Password</label><input type="password" id="registerPassword" class="form-control"></div>
<div class="mb-3"><label class="form-label">Confirm Password</label><input type="password" id="registerConfirm" class="form-control"></div>
<div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="termsCheck"><label class="form-check-label" for="termsCheck">I accept the terms</label></div>
<button type="submit" class="btn btn-success">Register</button>
</form>
</div>
</div>
</div>

<script src="js/script.js"></script>
</body>
</html>
