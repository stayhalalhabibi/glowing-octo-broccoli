<!DOCTYPE html>
<html>
<head>
<style>
/* Relative Box */
.relative-box{
    width:100px;
    height:100px;
    background:red;

    position:relative;
    left:40px;
    top:20px;
    margin-bottom:50px;
}

/* Adjacent Boxes */
.box1{
    width:100px;
    height:100px;
    background:blue;

    position:relative;
    left:50px;
}

.box2{
    width:100px;
    height:100px;
    background:green;
}
</style>
</head>
<body>

<h2>Relative Position Example</h2>
<div class="relative-box"></div>

<h2>Two Adjacent Boxes</h2>
<div class="box1"></div>
<div class="box2"></div>

</body>
</html>
