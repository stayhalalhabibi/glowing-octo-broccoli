<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Position</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
}

.content{
    margin-top:80px;
    padding:20px;
}

.top-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:red;
    color:white;
    padding:12px 18px;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

.top-btn:hover{
    background:darkred;
}
</style>
</head>
<body>

<div class="header">
    Fixed Header
</div>

<div class="content">
    <h2>Scrollable Content</h2>

    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>

    <p style="height:1200px;">
        Scroll down to see the fixed header and fixed Back to Top button remain visible.
    </p>
</div>

<a href="#" class="top-btn">Top</a>

</body>
</html>
