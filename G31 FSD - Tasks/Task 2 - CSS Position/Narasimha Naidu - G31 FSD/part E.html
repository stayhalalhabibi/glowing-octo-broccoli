<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Part E - Fixed Position</title>

<style>
    
    .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: black;
        color: white;
        text-align: center;
        padding: 15px;
    }

    
    .content {
        margin-top: 70px; 
        padding: 20px;
    }

    
    .section {
        height: 500px;
        border-bottom: 1px solid gray;
    }

    
    .top-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: blue;
        color: white;
        padding: 12px 20px;
        text-decoration: none;
        border-radius: 5px;
    }
</style>
</head>
<body>

    
    <div class="header">
        Fixed Header
    </div>

    
    <div class="content">

        <div class="section">
            <h2>Section 1</h2>
            <p>Scroll down to test fixed positioning.</p>
        </div>

        <div class="section">
            <h2>Section 2</h2>
        </div>

        <div class="section">
            <h2>Section 3</h2>
        </div>

        <div class="section">
            <h2>Section 4</h2>
        </div>

    </div>

    
    <a href="#" class="top-btn">↑ Top</a>

</body>
</html>
