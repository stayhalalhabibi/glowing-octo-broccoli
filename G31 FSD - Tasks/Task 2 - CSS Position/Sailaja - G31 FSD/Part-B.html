<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relative Position</title>

<style>
    .container{
        display:flex;
        gap:20px;
        margin:50px;
    }

    .box{
        width:150px;
        height:100px;
        color:white;
        font-size:20px;
        font-weight:bold;
        text-align:center;
        line-height:100px;
    }

    .box1{
        background:blue;
        position:relative;
        left:40px;
        top:20px;
    }

    .box2{
        background:red;
    }
</style>
</head>
<body>

<div class="container">
    <div class="box box1">Box 1</div>
    <div class="box box2">Box 2</div>
</div>

</body>
</html>
