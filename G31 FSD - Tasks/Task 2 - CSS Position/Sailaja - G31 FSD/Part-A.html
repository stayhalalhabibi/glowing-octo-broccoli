<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Position Example</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    .box {
        width: 200px;
        height: 100px;
        margin: 10px 0;
        color: white;
        text-align: center;
        line-height: 100px;
        font-size: 20px;
        font-weight: bold;
    }

    .box1 {
        background-color: royalblue;
    }

    .box2 {
        background-color: green;

        /* Static Position */
        position: static;

        /* These values have no effect */
        top: 50px;
        left: 50px;
    }

    .box3 {
        background-color: crimson;
    }
</style>

</head>
<body>

<h2>Position: Static Example</h2>

<div class="box box1">Box 1</div>

<div class="box box2">
    Box 2 (Static)<br>
</div>

<div class="box box3">Box 3</div>

</body>
</html>
