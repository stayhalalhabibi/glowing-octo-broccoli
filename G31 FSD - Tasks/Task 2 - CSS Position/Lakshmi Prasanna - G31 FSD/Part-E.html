<!--
## Part E - Sticky Position
17. Create a navigation bar using position: sticky.
18. Make the navbar stick to the top when scrolling.
19. Add multiple content sections to test sticky behavior.
20. Explain the difference between fixed and sticky.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Part E - Sticky Position</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .top-banner {
      background-color: lightcoral;
      padding: 30px;
      text-align: center;
      font-size: 24px;
    }
    .navbar {
      position: sticky;
      top: 0;
      background-color: darkgreen;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      z-index: 100;
    }
    .section {
      height: 400px;
      margin: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background-color: lightblue;
    }
    p {
      margin: 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="top-banner">Welcome to My Page - Scroll Down!</div>
  <nav class="navbar">Sticky Navigation Bar</nav>
  <div class="section">Section 1</div>
  <div class="section">Section 2</div>
  <div class="section">Section 3</div>
  <div class="section">Section 4</div>
  <p>Difference: Fixed always stays on screen regardless of position. Sticky stays in normal flow until you scroll to it, then sticks.</p>
</body>
</html>
