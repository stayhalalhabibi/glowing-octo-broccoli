<!--
## Part D - Fixed Position
13. Create a "Back to Top" button fixed at bottom-right corner.
14. Add enough content to make the page scrollable.
15. Verify button remains visible while scrolling.
16. Create a fixed header that stays at the top.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Part D - Fixed Position</title>
  <style>
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: darkblue;
      color: white;
      padding: 15px;
      text-align: center;
      z-index: 100;
    }
    .content {
      margin-top: 60px;
      padding: 20px;
    }
    .section {
      height: 300px;
      margin: 20px 0;
      background-color: lightblue;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .back-to-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: red;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="fixed-header">Fixed Header - Always Visible</div>
  <div class="content">
    <div class="section">Section 1 - Scroll Down</div>
    <div class="section">Section 2</div>
    <div class="section">Section 3</div>
    <div class="section">Section 4</div>
    <div class="section">Section 5</div>
  </div>
  <a href="#" class="back-to-top">Top</a>
</body>
</html>
