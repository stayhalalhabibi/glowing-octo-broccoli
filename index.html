<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <h1 class="text-center mt-3">SAMSUNG</h1>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <!-- Hamburger Menu -->
            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <!-- Navigation Links -->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#home">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#about">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#services">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                </ul>

                <!-- Login Button -->
                <a href="#login" class="btn btn-success">
                    Login
                </a>

            </div>
        </div>
    </nav>

    <!-- Home Section -->
    <section id="home" class="container mt-5">
        <h2>Home</h2>
        <p>Welcome to Samsung Home Page.</p>

        <img src="images/samsung.jpg" class="img-fluid" alt="Samsung">
    </section>

    <!-- About Section -->
    <section id="about" class="container mt-5">
        <h2>About</h2>
        <p>Samsung is one of the world's leading technology companies.</p>
    </section>

    <!-- Services Section -->
    <section id="services" class="container mt-5">
        <h2>Services</h2>
        <p>We provide mobile phones, laptops, TVs and smart devices.</p>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="container mt-5">
        <h2>Contact</h2>
        <p>Email: support@samsung.com</p>
    </section>

    <!-- Login Section -->
    <section id="login" class="container mt-5 mb-5">
        <div class="row justify-content-center">

            <div class="col-md-4">
                <div class="card shadow">

                    <div class="card-header text-center">
                        <h3>Login</h3>
                    </div>

                    <div class="card-body">

                        <form>
                            <div class="mb-3">
                                <label class="form-label">
                                    Email
                                </label>
                                <input type="email"
                                       class="form-control"
                                       placeholder="Enter Email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Password
                                </label>
                                <input type="password"
                                       class="form-control"
                                       placeholder="Enter Password">
                            </div>

                            <button type="submit"
                                    class="btn btn-primary w-100">
                                Login
                            </button>
                        </form>

                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
